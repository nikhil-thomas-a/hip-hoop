<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hip Hoop AI — NBA x Hip-Hop Performance Predictor</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #111; min-height: 100vh; }
.app { max-width: 820px; margin: 0 auto; padding: 2rem 1rem; }
.header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.5rem; }
.logo { width: 44px; height: 44px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.title { font-size: 24px; font-weight: 600; color: #111; }
.subtitle { font-size: 13px; color: #666; margin-top: 3px; }
/* Key banner */
.key-banner { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 10px; background: #fff; }
.key-banner.set { background: #E1F5EE; border-color: #9FE1CB; }
.key-icon { font-size: 16px; flex-shrink: 0; padding-top: 1px; }
.key-input-wrap { flex: 1; display: flex; gap: 8px; }
.key-input { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: 'SFMono-Regular', Consolas, monospace; background: #fff; color: #111; outline: none; }
.key-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
.key-btn { padding: 7px 14px; background: #1D9E75; color: #fff; border: none; border-radius: 7px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.key-btn:hover { background: #0F6E56; }
.key-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.key-btn.secondary { background: none; border: 1px solid #9FE1CB; color: #0F6E56; }
.key-btn.secondary:hover { background: rgba(29,158,117,0.08); }
.key-btn.toggle { background: none; border: 1px solid #ddd; color: #666; font-size: 12px; }
.key-btn.toggle:hover { border-color: #aaa; }
.key-set-label { font-size: 13px; color: #0F6E56; font-weight: 500; padding-top: 8px; }
.key-hint { font-size: 11px; color: #888; margin-top: 5px; }
.key-hint a { color: #1D9E75; text-decoration: none; }
.key-hint a:hover { text-decoration: underline; }
/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5; }
.tab { padding: 9px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #111; border-bottom-color: #1D9E75; font-weight: 500; }
.tab:hover:not(.active) { color: #333; }
/* Card */
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; }
/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input, .form-group select { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #111; outline: none; appearance: none; }
.form-group input:focus, .form-group select:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
.predict-btn { width: 100%; margin-top: 18px; padding: 11px; background: #1D9E75; color: #fff; border: none; border-radius: 9px; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.predict-btn:hover:not(:disabled) { background: #0F6E56; }
.predict-btn:disabled { opacity: 0.6; cursor: not-allowed; }
/* Results */
.result-area { margin-top: 1.5rem; border-top: 1px solid #e5e5e5; padding-top: 1.5rem; }
.metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.metric { background: #f7f7f7; border-radius: 9px; padding: 14px; text-align: center; }
.metric-val { font-size: 26px; font-weight: 600; }
.metric-val.up { color: #0F6E56; }
.metric-val.down { color: #A32D2D; }
.metric-lbl { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.confidence-bar-wrap { margin-bottom: 1.5rem; }
.confidence-label { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 7px; }
.bar-track { height: 9px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.7s ease; }
.ai-explanation { background: #f7fdf9; border: 1px solid #C0E8D5; border-radius: 10px; padding: 1rem 1.2rem; font-size: 14px; line-height: 1.75; color: #111; }
.ai-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #0F6E56; font-weight: 600; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
.ai-label-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; display: inline-block; }
.error-msg { margin-top: 1rem; color: #A32D2D; font-size: 13px; background: #fdf3f3; border: 1px solid #f5c6c6; border-radius: 8px; padding: 10px 12px; }
/* No key state */
.no-key-msg { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; }
.no-key-msg strong { display: block; font-size: 16px; color: #333; margin-bottom: 8px; font-weight: 500; }
/* Chat */
.chat-wrap { display: flex; flex-direction: column; height: 540px; }
.messages { flex: 1; overflow-y: auto; padding: 0 0 1rem; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.msg-avatar.ai { background: #E1F5EE; color: #0F6E56; }
.msg-avatar.user { background: #eee; color: #555; }
.msg-bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; }
.msg-bubble.ai { background: #f5f5f5; color: #111; border-radius: 4px 14px 14px 14px; }
.msg-bubble.user { background: #1D9E75; color: #fff; border-radius: 14px 4px 14px 14px; }
.chat-input-row { display: flex; gap: 8px; border-top: 1px solid #e5e5e5; padding-top: 1rem; }
.chat-input { flex: 1; padding: 10px 13px; border: 1px solid #ddd; border-radius: 9px; font-size: 14px; background: #fff; color: #111; outline: none; }
.chat-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
.send-btn { padding: 10px 18px; background: #1D9E75; color: #fff; border: none; border-radius: 9px; font-size: 14px; cursor: pointer; font-weight: 500; }
.send-btn:hover:not(:disabled) { background: #0F6E56; }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1rem; }
.chip { padding: 5px 12px; background: #f5f5f5; border: 1px solid #e5e5e5; border-radius: 100px; font-size: 12px; cursor: pointer; color: #555; }
.chip:hover { border-color: #1D9E75; color: #1D9E75; background: #f0fdf8; }
/* Spinner */
.spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
.typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: blink 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
@media (max-width: 540px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }
  .metrics-row { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const STORAGE_KEY = "hiphoop_api_key";
const API_URL = "https://api.anthropic.com/v1/messages";

const SYSTEM_PROMPT = `You are the Hip Hoop AI assistant. Hip Hoop is a data science project that analyzes NBA player performance before and after they are mentioned in hip-hop songs. The dataset covers ~110 real hip-hop NBA mentions from 1992–2022.

Key findings from the dataset:
- Players mentioned in hype/positive tracks see an average +2.1 PPG boost in the 2-week window post-mention
- Mentions during playoff runs show the strongest correlation (+3.4 PPG avg)
- Era matters: 1990s mentions (low-pace era) had smaller absolute stat changes vs 2010s+
- Top mentioned players: LeBron James (14 mentions), Kobe Bryant (11), Allen Iverson (8), Kevin Durant (7)
- Rappers from the player's home city show 40% stronger mention-to-performance correlation
- Critical/diss mentions show slight negative correlation (-0.8 PPG on average)
- Sentiment scores (VADER) range from -1 (diss) to +1 (pure hype), median is +0.62
- Statistical tests used: paired t-test, Mann-Whitney U, Pearson correlation, OLS regression
- Era normalization accounts for pace differences between decades

Answer questions about the Hip Hoop dataset, methodology, and findings. Be concise, specific, and data-driven. Reference actual stats when possible.`;

async function callClaude(messages, apiKey, system) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: system || SYSTEM_PROMPT,
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

function KeyBanner({ apiKey, setApiKey }) {
  const [draft, setDraft] = useState("");
  const [show, setShow] = useState(false);

  function save() {
    const k = draft.trim();
    if (!k.startsWith("sk-")) return;
    localStorage.setItem(STORAGE_KEY, k);
    setApiKey(k);
    setDraft("");
  }

  function clear() {
    localStorage.removeItem(STORAGE_KEY);
    setApiKey("");
  }

  if (apiKey) return (
    <div className="key-banner set">
      <span className="key-icon">🔑</span>
      <span className="key-set-label" style={{flex:1}}>API key saved — ready to use</span>
      <button className="key-btn secondary" onClick={clear}>Remove key</button>
    </div>
  );

  return (
    <div className="key-banner">
      <span className="key-icon">🔑</span>
      <div style={{flex:1}}>
        <div className="key-input-wrap">
          <input
            className="key-input"
            type={show ? "text" : "password"}
            placeholder="Paste your Anthropic API key (sk-ant-...)"
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => e.key === "Enter" && save()}
          />
          <button className="key-btn toggle" onClick={() => setShow(s => !s)}>{show ? "Hide" : "Show"}</button>
          <button className="key-btn" onClick={save} disabled={!draft.startsWith("sk-")}>Save</button>
        </div>
        <p className="key-hint">
          Stored in your browser only — never sent anywhere except the Anthropic API.&nbsp;
          <a href="https://console.anthropic.com/keys" target="_blank" rel="noopener">Get a key →</a>
        </p>
      </div>
    </div>
  );
}

const SUGGESTIONS = [
  "Which player got the biggest boost?",
  "Do playoff mentions hit different?",
  "What's the methodology?",
  "Which rappers mention NBA players most?",
];

function PredictTab({ apiKey }) {
  const [form, setForm] = useState({
    player: "", rapper: "", song: "",
    sentiment: "hype", era: "2010s", position: "Guard", context: ""
  });
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function predict() {
    if (!form.player || !form.rapper || !apiKey) return;
    setLoading(true);
    setResult(null);
    try {
      const prompt = `Analyze this hip-hop NBA mention for the Hip Hoop model:

Player: ${form.player}
Rapper/Artist: ${form.rapper}
Song: ${form.song || "unknown"}
Mention sentiment: ${form.sentiment}
Era: ${form.era}
Position: ${form.position}
Context: ${form.context || "none provided"}

Based on Hip Hoop dataset patterns, predict:
1. Likely PPG change as a single number (e.g. 2.1 or -0.5)
2. AST change as a single number
3. REB change as a single number
4. Boost probability 0-100 as an integer
5. A 2-sentence explanation of why this mention would or would not boost performance

Respond ONLY in this exact JSON format with no markdown, preamble, or extra text:
{"ppg": 2.1, "ast": 0.4, "reb": 0.3, "confidence": 72, "explanation": "your explanation here"}`;

      const raw = await callClaude([{ role: "user", content: prompt }], apiKey, SYSTEM_PROMPT);
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
    } catch (e) {
      setResult({ error: e.message || "Could not generate prediction. Check your API key and try again." });
    }
    setLoading(false);
  }

  if (!apiKey) return (
    <div className="card no-key-msg">
      <strong>API key required</strong>
      Enter your Anthropic API key above to start predicting.
    </div>
  );

  const confColor = result && !result.error
    ? result.confidence >= 70 ? "#1D9E75" : result.confidence >= 50 ? "#BA7517" : "#A32D2D"
    : "#1D9E75";

  return (
    <div className="card">
      <div className="form-grid">
        <div className="form-group">
          <label>NBA Player</label>
          <input placeholder="e.g. LeBron James" value={form.player} onChange={e => set("player", e.target.value)} />
        </div>
        <div className="form-group">
          <label>Rapper / Artist</label>
          <input placeholder="e.g. Drake" value={form.rapper} onChange={e => set("rapper", e.target.value)} />
        </div>
        <div className="form-group">
          <label>Song (optional)</label>
          <input placeholder="e.g. Forever" value={form.song} onChange={e => set("song", e.target.value)} />
        </div>
        <div className="form-group">
          <label>Sentiment</label>
          <select value={form.sentiment} onChange={e => set("sentiment", e.target.value)}>
            <option value="hype">Hype / Positive</option>
            <option value="neutral">Neutral / Passing</option>
            <option value="critical">Critical / Diss</option>
          </select>
        </div>
        <div className="form-group">
          <label>Era</label>
          <select value={form.era} onChange={e => set("era", e.target.value)}>
            <option>1990s</option>
            <option>2000s</option>
            <option>2010s</option>
            <option>2020s</option>
          </select>
        </div>
        <div className="form-group">
          <label>Position</label>
          <select value={form.position} onChange={e => set("position", e.target.value)}>
            <option>Guard</option>
            <option>Forward</option>
            <option>Center</option>
          </select>
        </div>
        <div className="form-group full">
          <label>Context (optional)</label>
          <input placeholder="e.g. playoff run, hometown rapper, rivalry game..." value={form.context} onChange={e => set("context", e.target.value)} />
        </div>
      </div>

      <button className="predict-btn" onClick={predict} disabled={loading || !form.player || !form.rapper}>
        {loading ? <><span className="spinner" /> Analyzing mention...</> : "Predict performance impact"}
      </button>

      {result && !result.error && (
        <div className="result-area">
          <div className="metrics-row">
            {[["ppg","PPG change"],["ast","AST change"],["reb","REB change"]].map(([k, lbl]) => (
              <div className="metric" key={k}>
                <div className={`metric-val ${result[k] >= 0 ? "up" : "down"}`}>
                  {result[k] >= 0 ? "+" : ""}{Number(result[k]).toFixed(1)}
                </div>
                <div className="metric-lbl">{lbl}</div>
              </div>
            ))}
          </div>
          <div className="confidence-bar-wrap">
            <span className="confidence-label">Boost probability — {result.confidence}%</span>
            <div className="bar-track">
              <div className="bar-fill" style={{ width: `${result.confidence}%`, background: confColor }} />
            </div>
          </div>
          <div className="ai-explanation">
            <div className="ai-label"><span className="ai-label-dot" /> Claude's analysis</div>
            {result.explanation}
          </div>
        </div>
      )}
      {result?.error && <div className="error-msg">{result.error}</div>}
    </div>
  );
}

function ChatTab({ apiKey }) {
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Hey! Ask me anything about the Hip Hoop dataset — player stats, methodology, trends, or anything else." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function send(text) {
    const q = (text || input).trim();
    if (!q || !apiKey) return;
    setInput("");
    const next = [...messages, { role: "user", text: q }];
    setMessages(next);
    setLoading(true);
    try {
      const apiMsgs = next
        .slice(1)
        .map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text }));
      const reply = await callClaude(apiMsgs, apiKey, SYSTEM_PROMPT);
      setMessages([...next, { role: "assistant", text: reply }]);
    } catch (e) {
      setMessages([...next, { role: "assistant", text: "Something went wrong: " + (e.message || "unknown error") }]);
    }
    setLoading(false);
  }

  if (!apiKey) return (
    <div className="card no-key-msg">
      <strong>API key required</strong>
      Enter your Anthropic API key above to chat with Hip Hoop AI.
    </div>
  );

  return (
    <div className="card chat-wrap">
      <div className="chips">
        {SUGGESTIONS.map(s => (
          <span key={s} className="chip" onClick={() => send(s)}>{s}</span>
        ))}
      </div>
      <div className="messages">
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "user" : ""}`}>
            <div className={`msg-avatar ${m.role === "user" ? "user" : "ai"}`}>
              {m.role === "user" ? "U" : "HH"}
            </div>
            <div className={`msg-bubble ${m.role === "user" ? "user" : "ai"}`}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div className="msg">
            <div className="msg-avatar ai">HH</div>
            <div className="msg-bubble ai" style={{display:"flex",gap:5,alignItems:"center",padding:"13px 14px"}}>
              <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-input-row">
        <input
          className="chat-input"
          placeholder="Ask about Hip Hoop data..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !loading && send()}
          disabled={loading}
        />
        <button className="send-btn" onClick={() => send()} disabled={loading || !input.trim()}>Send</button>
      </div>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEY) || "");
  const [tab, setTab] = useState("predict");

  return (
    <div className="app">
      <div className="header">
        <div className="logo">🏀</div>
        <div>
          <div className="title">Hip Hoop AI</div>
          <div className="subtitle">NBA performance impact predictor · powered by Claude</div>
        </div>
      </div>
      <KeyBanner apiKey={apiKey} setApiKey={setApiKey} />
      <div className="tabs">
        <button className={`tab ${tab === "predict" ? "active" : ""}`} onClick={() => setTab("predict")}>Predict impact</button>
        <button className={`tab ${tab === "chat" ? "active" : ""}`} onClick={() => setTab("chat")}>Ask Hip Hoop</button>
      </div>
      {tab === "predict" ? <PredictTab apiKey={apiKey} /> : <ChatTab apiKey={apiKey} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
